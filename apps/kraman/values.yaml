replicaCount: 1

deploymentAnnotations: {}

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

image:
  repository: ghcr.io/waushop/kraman
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: "web"
fullnameOverride: "web"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: v2.kraman.ee
      paths:
        - path: /
          pathType: Prefix
    - host: kraman.ee
      paths:
        - path: /
          pathType: Prefix
    - host: www.kraman.ee
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kraman-v2-tls
      hosts:
        - v2.kraman.ee
    - secretName: kraman-tls
      hosts:
        - kraman.ee
        - www.kraman.ee

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: production
