# wauhive sealed secrets — placeholder.
#
# This file MUST contain three SealedSecret resources before Flux reconciles
# wauhive successfully:
#
#   1. wauhive-master-secret  — the 32-byte at-rest encryption key for API
#      keys. Mounted as a file at /run/secrets/wauhive/master.secret. Pinned
#      via K8s so an empty-PVC restore doesn't generate a new key and brick
#      the encrypted Anthropic-key column.
#   2. wauhive-secrets        — WAUHIVE_PASSWORD, ANTHROPIC_API_KEY,
#      LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY. Surfaced via
#      envFrom on backend + litestream containers.
#   3. ghcr-pull-secret       — dockerconfigjson, only if the ghcr packages
#      are private.
#
# See services/wauhive/README.md for the kubeseal commands. Until all three
# are sealed and committed here, the backend pod will fail to start.
