---
{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "mysql.fullname" . }}-auth
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore | default "cluster-secret-store" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "mysql.fullname" . }}-auth
    template:
      type: Opaque
      data:
        mysql-root-password: "{{ `{{ .rootPassword }}` }}"
        {{- range .Values.databases }}
        mysql-password-{{ .name }}: "{{ `{{ .` }}{{ .name }}{{ `Password }}` }}"
        {{- end }}
  data:
    - secretKey: rootPassword
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.rootPassword }}
    {{- range .Values.databases }}
    - secretKey: {{ .name }}Password
      remoteRef:
        key: {{ $.Values.externalSecrets.remoteRefs.databasePasswords }}/{{ .name }}
    {{- end }}
{{- end }}