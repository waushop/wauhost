{{- if and .Values.vault.enabled .Values.vault.dev.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretStore.auth.tokenSecretRef.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-auth
type: Opaque
stringData:
  {{ .Values.secretStore.auth.tokenSecretRef.key }}: {{ .Values.vault.dev.rootToken | quote }}
{{- end }}