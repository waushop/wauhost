apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wauhive
  namespace: flux-system
spec:
  releaseName: wauhive
  targetNamespace: wauhive
  interval: 30m
  chart:
    spec:
      chart: ./services/wauhive
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
