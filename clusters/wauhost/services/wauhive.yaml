apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wauhive
  namespace: flux-system
spec:
  releaseName: wauhive
  targetNamespace: wauhive
  # 5m instead of the agrofort/tahetrukk default of 30m. wauhive ships
  # often during dev and the operator wants a tight loop between
  # `git push wauhost` (or a fresh image landing on ghcr) and the cluster
  # actually running it. Cheap — six reconciles per hour vs. two.
  interval: 5m
  chart:
    spec:
      chart: ./services/wauhive
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
