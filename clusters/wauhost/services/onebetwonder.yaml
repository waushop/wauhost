apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onebetwonder
  namespace: flux-system
spec:
  releaseName: web
  targetNamespace: onebetwonder
  storageNamespace: onebetwonder
  interval: 30m
  chart:
    spec:
      chart: ./services/onebetwonder
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
