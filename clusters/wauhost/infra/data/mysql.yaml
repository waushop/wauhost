apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mysql
  namespace: flux-system
spec:
  releaseName: mysql
  targetNamespace: mysql
  interval: 30m
  chart:
    spec:
      chart: ./infra/mysql
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    externalSecrets:
      enabled: false
