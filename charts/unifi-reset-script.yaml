apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-reset-script
  namespace: unifi
data:
  reset.sh: |
    #!/bin/bash
    echo "🧹 Starting UniFi Controller Reset..."

    # Stop UniFi service
    echo "⏹️ Stopping UniFi service..."
    killall java 2>/dev/null || true
    sleep 5

    # Backup current data directory
    echo "💾 Creating backup of current data..."
    cp -r /unifi/data /unifi/data-backup-$(date +%Y%m%d-%H%M%S)

    # Remove database files (keeps certificates and system properties)
    echo "🗑️ Removing database files..."
    rm -rf /unifi/data/db/*
    rm -f /unifi/data/*.pid
    rm -rf /unifi/data/tmp/*
    rm -rf /unifi/data/work/*

    # Keep essential files
    echo "✅ Preserving certificates and system config..."
    # system.properties (our custom config)
    # keystore (SSL certificates)
    # firmware.json (firmware info)
    # backup/ directory (local backups)

    echo "🎉 UniFi reset complete! Restarting pod will initialize fresh database."