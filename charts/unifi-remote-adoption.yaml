# UniFi Remote Adoption Configuration
# This ensures all required ports are accessible for remote device adoption

apiVersion: v1
kind: Service
metadata:
  name: unifi-adoption-ports
  namespace: unifi
  annotations:
    # Controller inform port (8443) - device-to-controller communication
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  selector:
    app: unifi
  ports:
  # Controller inform port (HTTPS for device adoption)
  - name: controller-inform
    port: 8443
    targetPort: 8443
    protocol: TCP
  # Device discovery UDP port
  - name: discovery-udp
    port: 10001
    targetPort: 10001
    protocol: UDP
  # STUN server for NAT traversal
  - name: stun-udp
    port: 3478
    targetPort: 3478
    protocol: UDP
  # HTTP alternate (optional)
  - name: controller-http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer