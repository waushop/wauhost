apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: unifi-secure
  namespace: unifi
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`unifi.waushop.ee`)
    kind: Rule
    services:
    - name: unifi-ingress
      port: 8443
      scheme: https
      serversTransport: unifi-https-transport
  tls:
    secretName: unifi-tls
    options:
      name: unifi-tls-options
      namespace: unifi
    domains:
    - main: unifi.waushop.ee