# UniFi Deployment with Security Hardening
# Following official jacobalberty/unifi best practices

apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi
  namespace: unifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi
  template:
    metadata:
      labels:
        app: unifi
    spec:
      # Official security: run as non-root user 999/999
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: unifi
        image: jacobalberty/unifi:8.5.6
        imagePullPolicy: IfNotPresent
        env:
        - name: PUID
          value: "999"
        - name: PGID
          value: "999"
        - name: TZ
          value: "Europe/Tallinn"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8443
          name: https
          protocol: TCP
        - containerPort: 3478
          name: stun-udp
          protocol: UDP
        - containerPort: 6789
          name: speedtest
          protocol: TCP
        - containerPort: 10001
          name: discovery
          protocol: UDP
        volumeMounts:
        - name: data
          mountPath: /unifi/data
        - name: backup
          mountPath: /unifi/backup
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: unifi-pvc
      - name: backup
        persistentVolumeClaim:
          claimName: unifi-pvc