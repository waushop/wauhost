apiVersion: batch/v1
kind: Job
metadata:
  name: unifi-full-reset
  namespace: unifi
spec:
  template:
    spec:
      restartPolicy: Never
      volumes:
      - name: unifi-data
        persistentVolumeClaim:
          claimName: unifi-pvc
      containers:
      - name: reset
        image: ubuntu:22.04
        command:
        - bash
        - -c
        - |
          echo "Starting FULL UniFi Controller Reset..."
          cp -r /unifi/data /unifi/emergency-backup-$(date +%Y%m%d-%H%M%S) || true
          echo "Removing all UniFi data..."
          find /unifi/data -mindepth 1 -delete
          echo "Full reset complete."
        volumeMounts:
        - name: unifi-data
          mountPath: /unifi/data
        securityContext:
          runAsUser: 0
          runAsGroup: 0
