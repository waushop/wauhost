apiVersion: batch/v1
kind: Job
metadata:
  name: unifi-reset-job
  namespace: unifi
spec:
  template:
    spec:
      restartPolicy: Never
      volumes:
      - name: unifi-data
        persistentVolumeClaim:
          claimName: unifi-pvc
      - name: reset-script
        configMap:
          name: unifi-reset-script
          defaultMode: 0755
      containers:
      - name: unifi-reset
        image: ubuntu:22.04
        command:
        - /scripts/reset.sh
        volumeMounts:
        - name: unifi-data
          mountPath: /unifi/data
        - name: reset-script
          mountPath: /scripts
        securityContext:
          runAsUser: 0
          runAsGroup: 0
