replicaCount: 1
deploymentAnnotations: {}
# SQLite + WAL is single-writer. Recreate ensures the old pod releases the PVC
# before the new pod tries to attach (RWO).
deploymentStrategy:
  type: Recreate
image:
  repository: ghcr.io/waushop/raha
  # `tag` is auto-bumped to the short git SHA by the app's deploy.yml after
  # each successful image build. Don't hand-edit unless pinning for rollback.
  tag: 0a8ce30
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: "web"
fullnameOverride: "web"
serviceAccount:
  create: true
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: raha.waushop.ee
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: raha-waushop-tls
      hosts:
        - raha.waushop.ee
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
nodeSelector: {}
tolerations: []
affinity: {}
# Persistent volume for /data (SQLite DB file).
persistence:
  size: 1Gi
  storageClass: "" # empty = use cluster default (local-path on k3s)
env:
  NODE_ENV: production
  DB_PATH: "/data/raha.sqlite"
# Continuous SQLite-to-object-storage replication via Litestream. Mirrors the
# wauhive setup: init container restores from the bucket on a fresh PVC, sidecar
# ships WAL frames every `syncInterval`. Disabled by default until the bucket
# + credentials are provisioned.
#
# To enable:
#   1. Create a Hetzner bucket (or R2) and seal these env vars into the raha
#      web-secrets SealedSecret:
#        LITESTREAM_ACCESS_KEY_ID
#        LITESTREAM_SECRET_ACCESS_KEY
#   2. Set litestream.enabled=true.
litestream:
  enabled: false
  image:
    repository: litestream/litestream
    tag: "0.3.13"
    pullPolicy: IfNotPresent
  bucket: "raha"
  endpoint: "hel1.your-objectstorage.com"
  region: "eu-central"
  syncInterval: "10s"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
# Secrets are OPTIONAL on first deploy: the PIN is set via the in-app
# /login first-time-setup flow and persisted to the SQLite DB. You only need
# secrets/raha.yaml when:
#   - bootstrapping an existing PIN hash (AUTH_PIN_HASH) — auto-migrates to DB
#     on first login, after which you can remove it
#   - enabling Litestream (LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY)
# Managed via SealedSecret in wauhost/secrets/raha.yaml when needed.
