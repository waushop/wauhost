replicaCount: 1
deploymentAnnotations: {}
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
image:
  repository: ghcr.io/waushop/tahetrukk
  # `tag` is auto-bumped to the short git SHA by the app's deploy.yml after
  # each successful image build. Don't hand-edit unless pinning for rollback.
  tag: 1c2ca96
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: "web"
fullnameOverride: "web"
serviceAccount:
  create: true
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: tahetrukk.ee
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tahetrukk-tls
      hosts:
        - tahetrukk.ee
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
env:
  NODE_ENV: production
