---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ghost.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ghost.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ghost.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.podSecurityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
      {{- end }}
      {{- if eq (.Values.storage.active | default "") "s3" }}
      initContainers:
        - name: install-s3-adapter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ['sh', '-c']
          args:
            - |
              TARGET="/var/lib/ghost/content/adapters/storage/s3"
              echo "Installing ghost-storage-adapter-s3..."
              rm -rf "$TARGET"
              mkdir -p /var/lib/ghost/content/adapters/storage
              cd /tmp
              npm install ghost-storage-adapter-s3 --no-save 2>&1
              cp -r node_modules/ghost-storage-adapter-s3 "$TARGET"
              cd "$TARGET" && npm install --production 2>&1
              rm -rf /tmp/node_modules /tmp/package-lock.json
              echo "S3 adapter installed."

              # Patch Ghost config to use S3 storage adapter
              CONFIG="/var/lib/ghost/config.production.json"
              node -e "
                const fs = require('fs');
                const cfg = JSON.parse(fs.readFileSync('$CONFIG'));
                cfg.storage = { active: 's3', s3: {} };
                fs.writeFileSync('$CONFIG', JSON.stringify(cfg, null, 2));
              "
              echo "Ghost config patched with S3 storage adapter."
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: ghost-content
              mountPath: /var/lib/ghost/content
      {{- end }}
      containers:
        - name: ghost
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.securityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                {{- toYaml .Values.securityContext.capabilities.drop | nindent 16 }}
          {{- end }}
          env:
            # Ghost Configuration
            - name: url
              value: "https://{{ .Values.host }}"
            - name: NODE_ENV
              value: "production"
            
            # Database Configuration
            - name: database__connection__host
              value: "{{ .Values.database.host }}"
            - name: database__connection__user
              value: "{{ .Values.database.user }}"
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.fullname" . }}-secrets
                  key: database__connection__password
            - name: database__connection__database
              value: "{{ .Values.database.database }}"
            - name: database__pool__min
              value: "{{ .Values.ghost.config.database.pool.min | default 2 }}"
            - name: database__pool__max
              value: "{{ .Values.ghost.config.database.pool.max | default 10 }}"
            
            {{- if .Values.mail.enabled }}
            # Mail Configuration
            - name: mail__transport
              value: "{{ .Values.mail.transport }}"
            - name: mail__options__service
              value: "{{ .Values.mail.options.service }}"
            - name: mail__options__host
              value: "{{ .Values.mail.options.host }}"
            - name: mail__options__port
              value: "{{ .Values.mail.options.port | toString }}"
            - name: mail__options__secure
              value: "{{ .Values.mail.options.secure | toString }}"
            - name: mail__options__auth__user
              value: "{{ .Values.mail.options.auth.user }}"
            - name: mail__options__auth__pass
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.fullname" . }}-secrets
                  key: mail__options__auth__pass
            - name: mail__from
              value: "{{ .Values.mail.from }}"
            {{- end }}

            {{- if eq (.Values.storage.active | default "") "s3" }}
            # S3 Storage Configuration
            - name: storage__active
              value: "s3"
            - name: storage__s3__accessKeyId
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.fullname" . }}-secrets
                  key: storage__s3__accessKeyId
            - name: storage__s3__secretAccessKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.fullname" . }}-secrets
                  key: storage__s3__secretAccessKey
            - name: storage__s3__bucket
              value: {{ .Values.storage.s3.bucket | quote }}
            - name: storage__s3__endpoint
              value: {{ .Values.storage.s3.endpoint | quote }}
            - name: storage__s3__region
              value: {{ .Values.storage.s3.region | quote }}
            - name: storage__s3__forcePathStyle
              value: {{ .Values.storage.s3.forcePathStyle | default true | toString | quote }}
            {{- if .Values.storage.s3.assetHost }}
            - name: storage__s3__assetHost
              value: {{ .Values.storage.s3.assetHost | quote }}
            {{- end }}
            {{- end }}

            # Privacy & Performance Configuration
            - name: privacy__useUpdateCheck
              value: "{{ .Values.ghost.config.privacy.useUpdateCheck | default false | toString }}"
            - name: privacy__useGravatar
              value: "{{ .Values.ghost.config.privacy.useGravatar | default false | toString }}"
            - name: privacy__useRpcPing
              value: "{{ .Values.ghost.config.privacy.useRpcPing | default false | toString }}"
            
            # Logging Configuration
            - name: logging__level
              value: "{{ .Values.ghost.config.logging.level | default "info" }}"
            
            # Server Configuration
            - name: server__port
              value: "{{ .Values.ghost.config.server.port | default 2368 | toString }}"
            - name: server__host
              value: "{{ .Values.ghost.config.server.host | default "0.0.0.0" }}"
          
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
          ports:
            - name: http
              containerPort: {{ .Values.ghost.config.server.port | default 2368 }}
              protocol: TCP
          
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          
          volumeMounts:
            - name: ghost-content
              mountPath: {{ .Values.ghost.config.paths.contentPath | default "/var/lib/ghost/content" }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      volumes:
        - name: ghost-content
          persistentVolumeClaim:
            claimName: {{ .Values.releaseName }}-pvc
