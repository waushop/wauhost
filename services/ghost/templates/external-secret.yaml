{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ghost.fullname" . }}-secrets
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore | default "cluster-secret-store" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "ghost.fullname" . }}-secrets
    template:
      type: Opaque
      data:
        database__connection__password: "{{ `{{ .dbPassword }}` }}"
        {{- if .Values.mail.enabled }}
        mail__options__auth__pass: "{{ `{{ .mailPassword }}` }}"
        {{- end }}
  data:
    - secretKey: dbPassword
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.dbPassword }}
        property: password
    {{- if .Values.mail.enabled }}
    - secretKey: mailPassword
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRefs.mailPassword }}
        property: password
    {{- end }}
{{- end }}