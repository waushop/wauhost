nameOverride: "wauhive"
fullnameOverride: "wauhive"
# Pull both backend + frontend images from ghcr; the same secret already
# in use for agrofort/tahetrukk works here too.
imagePullSecrets:
  - name: ghcr-pull-secret
backend:
  image:
    repository: ghcr.io/waushop/wauhive-backend
    # `tag` is auto-bumped to the short git SHA by wauhive's release workflow
    # on every push to main. Don't hand-edit unless you're pinning to a
    # specific build for rollback.
    tag: "8899e11"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  # SQLite + WAL means SINGLE WRITER. Hard-coded to 1 replica with Recreate
  # strategy so we never have two pods touching the same DB file.
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  env:
    WAUHIVE_DRONES: "4"
    WAUHIVE_HTTPS: "true"
    WAUHIVE_MODEL: "claude-opus-4-7"
  # Persistent volume for /data (DB + secret + config + workspace).
  persistence:
    size: 5Gi
    storageClass: "" # empty = use cluster default
# Continuous SQLite-to-object-storage replication via Litestream. The PVC
# stays the canonical live DB; the bucket holds an always-current copy we
# restore from when a pod lands on an empty volume.
#
# Defaults to Hetzner Object Storage (matches agrofort/tahetrukk). Swap
# `endpoint` for Cloudflare R2 if you change your mind. Credentials come
# from the wauhive-secrets sealed secret: LITESTREAM_ACCESS_KEY_ID and
# LITESTREAM_SECRET_ACCESS_KEY.
litestream:
  enabled: true
  image:
    repository: litestream/litestream
    tag: "0.3.13"
    pullPolicy: IfNotPresent
  bucket: "wauhive"
  endpoint: "hel1.your-objectstorage.com"
  region: "eu-central"
  # How often Litestream cuts and ships a new WAL segment. 10s = RPO of
  # roughly 10s in the bad case. Bump to 60s if you want fewer PUTs.
  syncInterval: "10s"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
frontend:
  image:
    repository: ghcr.io/waushop/wauhive-frontend
    # Same auto-bump as backend.image.tag.
    tag: "8899e11"
    pullPolicy: IfNotPresent
  service:
    port: 3000
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  host: hive.waushop.ee
  tlsSecretName: wauhive-tls
  # Backend paths are matched by exact prefix; everything else falls through
  # to the frontend. Add new prefixes here when you add new API surface.
  apiPaths:
    - /auth
    - /tasks
    - /drones
    - /workspace
    - /evals
    - /runs
    - /schedules
    - /hive
    - /info
    - /health
    - /readyz
    - /metrics
serviceAccount:
  create: true
  name: ""
  annotations: {}
