apiVersion: v1
kind: Service
metadata:
  name: {{ include "wauhive.fullname" . }}-frontend
  labels:
    {{- include "wauhive.componentLabels" (merge (dict "component" "frontend") .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "wauhive.componentSelectorLabels" (merge (dict "component" "frontend") .) | nindent 4 }}
