{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wauhive.serviceAccountName" . }}
  labels:
    {{- include "wauhive.commonLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "wauhive.name" . }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
