replicaCount: 1
deploymentAnnotations: {}
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
image:
  repository: ghcr.io/waushop/agrofort
  # `tag` is auto-bumped to the short git SHA by the app's deploy.yml after
  # each successful image build. Don't hand-edit unless pinning for rollback.
  tag: 38c8ff2
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: "web"
fullnameOverride: "web"
serviceAccount:
  create: true
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: agrofort.ee
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agrofort-tls
      hosts:
        - agrofort.ee
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
env:
  NODE_ENV: production
  NEXT_PUBLIC_STORAGE_ENDPOINT: hel1.your-objectstorage.com
  NEXT_PUBLIC_STORAGE_PORT: "443"
  NEXT_PUBLIC_STORAGE_USE_SSL: "true"
  NEXT_PUBLIC_STORAGE_BUCKET: agrofort
  STORAGE_ENDPOINT: hel1.your-objectstorage.com
  STORAGE_PORT: "443"
  STORAGE_USE_SSL: "true"
  STORAGE_BUCKET: agrofort
  DB_HOST: mysql.mysql.svc.cluster.local
  DB_PORT: "3306"
  DB_USER: root
  DB_NAME: agrofort
  ENABLE_ADMIN: "true"
redirect:
  enabled: false
