replicaCount: 1
deploymentAnnotations: {}
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
image:
  repository: ghcr.io/waushop/ferryscanner
  # `tag` is auto-bumped to the short git SHA by the app's deploy.yml after
  # each successful image build. Don't hand-edit unless pinning for rollback.
  # Bootstrap value: the first push to ferryscanner main replaces this.
  tag: "c918644"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: "web"
fullnameOverride: "web"
serviceAccount:
  create: true
  annotations: {}
  name: ""
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
  hosts:
    - host: ferry.waushop.ee
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ferry-waushop-tls
      hosts:
        - ferry.waushop.ee
# Stateless app: only the public site + its /api/ferry proxy to praamid.ee.
# No database, no secrets, no cron — all monitoring runs client-side.
resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 96Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
